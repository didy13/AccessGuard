<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccessGuard Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #4f8ef7;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .brand-name { font-size: 1.2rem; font-weight: 700; }
  .brand-sub  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

  .status-badge {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: .8rem;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(52,211,153,.2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(52,211,153,.2); }
    50%      { box-shadow: 0 0 0 6px rgba(52,211,153,.05); }
  }

  .grid-top {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 680px) { .grid-top { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
  }
  .card-label {
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .countdown-num {
    font-size: 3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
  }
  .countdown-label { font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .progress-bar-wrap {
    margin-top: 14px;
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .9s linear;
  }

  .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-sub   { font-size: .78rem; color: var(--muted); margin-top: 6px; }
  .result-ok   { color: var(--green) !important; }
  .result-fail { color: var(--red) !important; }
  .result-none { color: var(--muted) !important; }

  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .history-header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-title { font-size: .85rem; font-weight: 600; }
  .history-count { font-size: .75rem; color: var(--muted); }

  .scan-item { border-bottom: 1px solid var(--border); }
  .scan-item:last-child { border-bottom: none; }

  .scan-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 22px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .scan-header:hover { background: var(--surface2); }

  .scan-icon {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .scan-icon-ok   { background: rgba(52,211,153,.12); color: var(--green); }
  .scan-icon-fail { background: rgba(248,113,113,.12); color: var(--red); }
  .scan-icon-none { background: var(--surface2); color: var(--muted); }

  .scan-meta { flex: 1; min-width: 0; }
  .scan-time    { font-size: .82rem; font-weight: 500; }
  .scan-summary { font-size: .74rem; color: var(--muted); margin-top: 2px; }
  .scan-chevron { color: var(--muted); font-size: .8rem; transition: transform .2s; }
  .chevron-open { transform: rotate(90deg); }

  .changes-wrap { padding: 0 22px 16px; overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  th {
    text-align: left;
    padding: 7px 10px;
    color: var(--muted);
    font-weight: 600;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: .68rem;
    font-weight: 600;
  }
  .badge-terminated { background: rgba(248,113,113,.15); color: var(--red); }
  .badge-added      { background: rgba(52,211,153,.15);  color: var(--green); }
  .badge-role       { background: rgba(251,191,36,.15);  color: var(--yellow); }
  .badge-ok         { background: rgba(52,211,153,.15);  color: var(--green); }
  .badge-fail       { background: rgba(248,113,113,.15); color: var(--red); }

  .providers { display: flex; gap: 4px; flex-wrap: wrap; }
  .prov-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: .68rem;
    color: var(--muted);
  }

  .empty-history {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
  }

  footer {
    margin-top: 28px;
    text-align: center;
    font-size: .72rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">&#x1F6E1;</div>
    <div>
      <div class="brand-name">AccessGuard</div>
      <div class="brand-sub" id="company-sub">Agent Dashboard</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="dot"></div>
    <span>Agent running</span>
  </div>
</header>

<div class="grid-top">
  <div class="card">
    <div class="card-label">Next scan in</div>
    <div class="countdown-num" id="countdown">--:--</div>
    <div class="countdown-label" id="countdown-label">Waiting for first scan&hellip;</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Last scan</div>
    <div class="stat-value" id="last-scan-time">&#x2014;</div>
    <div class="stat-sub result-none" id="last-scan-result">No scans yet</div>
  </div>

  <div class="card">
    <div class="card-label">Total scans</div>
    <div class="stat-value" id="total-scans">0</div>
    <div class="stat-sub" id="total-changes">0 changes detected</div>
  </div>
</div>

<div class="history-card">
  <div class="history-header">
    <div class="history-title">Scan history</div>
    <div class="history-count" id="history-count">0 scans</div>
  </div>
  <div id="history-list">
    <div class="empty-history">No scans yet &#x2014; agent will poll shortly.</div>
  </div>
</div>

<footer>
  AccessGuard Agent &nbsp;&middot;&nbsp;
  <span id="footer-company">&#x2014;</span> &nbsp;&middot;&nbsp;
  Poll interval: <span id="footer-interval">&#x2014;</span>
</footer>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────

function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function setText(id, val) {
  document.getElementById(id).textContent = val;
}

function fmtTime(iso) {
  if (!iso) return "—";
  return new Date(iso + "Z").toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "Z");
  return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
         d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function fmtSeconds(s) {
  if (s === null || s === undefined) return "--:--";
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

// ── SSE: real-time countdown ─────────────────────────────────────────────────

let pollInterval = 900;
const openScans = new Set();

const es = new EventSource("/api/stream");
es.onmessage = function(e) {
  const tick = JSON.parse(e.data);
  pollInterval = tick.poll_interval || 900;

  setText("countdown", fmtSeconds(tick.seconds_left));

  const pct = tick.seconds_left !== null
    ? Math.min(100, Math.round((tick.seconds_left / pollInterval) * 100))
    : 0;
  document.getElementById("progress-bar").style.width = pct + "%";

  setText("last-scan-time", fmtTime(tick.last_scan));

  if (tick.last_scan) {
    const el = document.getElementById("last-scan-result");
    if (tick.last_changes_count === 0) {
      el.textContent = "No changes";
      el.className = "stat-sub result-none";
    } else if (tick.last_all_succeeded) {
      el.textContent = tick.last_changes_count + " change(s) — all processed";
      el.className = "stat-sub result-ok";
    } else {
      el.textContent = tick.last_changes_count + " change(s) — some failed";
      el.className = "stat-sub result-fail";
    }
    setText("countdown-label", "Last scan: " + fmtTime(tick.last_scan));
  }
};

// ── Scan history ─────────────────────────────────────────────────────────────

function toggleScan(i) {
  const item = document.getElementById("scan-" + i);
  const wrap = document.getElementById("changes-" + i);
  const chev = document.getElementById("chev-" + i);
  if (!item) return;

  if (openScans.has(i)) {
    openScans.delete(i);
    wrap.style.display = "none";
    chev.classList.remove("chevron-open");
  } else {
    openScans.add(i);
    wrap.style.display = "block";
    chev.classList.add("chevron-open");
  }
}

function buildProviderTags(arr) {
  if (!arr || arr.length === 0) return '<span style="color:var(--muted)">—</span>';
  const frag = document.createDocumentFragment();
  const wrap = document.createElement("div");
  wrap.className = "providers";
  arr.forEach(p => {
    const span = document.createElement("span");
    span.className = "prov-tag";
    span.textContent = p;
    wrap.appendChild(span);
  });
  return wrap.outerHTML;
}

function buildChangesTable(changes) {
  const table = document.createElement("table");

  const thead = table.createTHead();
  const hrow = thead.insertRow();
  ["Employee", "Action", "Role change", "Revoked", "Granted", "Result", "Message"].forEach(h => {
    const th = document.createElement("th");
    th.textContent = h;
    hrow.appendChild(th);
  });

  const tbody = table.createTBody();
  changes.forEach(c => {
    const row = tbody.insertRow();

    // Employee
    const tdEmp = row.insertCell();
    const empName = document.createElement("div");
    empName.style.fontWeight = "500";
    empName.textContent = c.name;
    const empEmail = document.createElement("div");
    empEmail.style.cssText = "color:var(--muted);font-size:.72rem";
    empEmail.textContent = c.email;
    tdEmp.appendChild(empName);
    tdEmp.appendChild(empEmail);

    // Action badge
    const tdAction = row.insertCell();
    const badge = document.createElement("span");
    badge.className = "badge " + (
      c.action_type === "terminated" ? "badge-terminated" :
      c.action_type === "added"      ? "badge-added" : "badge-role"
    );
    badge.textContent =
      c.action_type === "terminated" ? "Terminated" :
      c.action_type === "added"      ? "Added" : "Role changed";
    tdAction.appendChild(badge);

    // Role change
    const tdRole = row.insertCell();
    tdRole.style.color = "var(--muted)";
    if (c.previous_role) {
      const prev = document.createElement("span");
      prev.style.color = "var(--red)";
      prev.textContent = c.previous_role;
      tdRole.appendChild(prev);
    }
    if (c.previous_role && c.new_role) {
      tdRole.appendChild(document.createTextNode(" → "));
    }
    if (c.new_role) {
      const next = document.createElement("span");
      next.style.color = "var(--green)";
      next.textContent = c.new_role;
      tdRole.appendChild(next);
    }
    if (!c.previous_role && !c.new_role) {
      tdRole.textContent = "—";
    }

    // Revoked / Granted (safe HTML via buildProviderTags)
    const tdRev = row.insertCell();
    tdRev.innerHTML = buildProviderTags(c.providers_revoked);
    const tdGrant = row.insertCell();
    tdGrant.innerHTML = buildProviderTags(c.providers_granted);

    // Result
    const tdResult = row.insertCell();
    const resultBadge = document.createElement("span");
    resultBadge.className = "badge " + (c.server_success ? "badge-ok" : "badge-fail");
    resultBadge.textContent = c.server_success ? "OK" : "Failed";
    tdResult.appendChild(resultBadge);

    // Message
    const tdMsg = row.insertCell();
    tdMsg.style.cssText = "color:var(--muted);max-width:220px;word-break:break-word";
    tdMsg.textContent = c.server_message || "—";
  });

  return table;
}

function renderHistory(data) {
  document.getElementById("company-sub").textContent =
    data.company_name ? data.company_name + " · " + data.connector_type : "Agent Dashboard";
  document.getElementById("footer-company").textContent = data.company_name || "—";
  document.getElementById("footer-interval").textContent =
    Math.floor(data.poll_interval / 60) + " min";

  const history = data.scan_history || [];
  setText("total-scans", history.length);
  const totalChanges = history.reduce((s, h) => s + h.changes_count, 0);
  setText("total-changes", totalChanges + " change(s) detected");
  setText("history-count", history.length + " scan(s)");

  const list = document.getElementById("history-list");

  if (history.length === 0) {
    list.textContent = "";
    const empty = document.createElement("div");
    empty.className = "empty-history";
    empty.textContent = "No scans yet — agent will poll shortly.";
    list.appendChild(empty);
    return;
  }

  // Rebuild only if count changed (avoids collapsing open items on every poll)
  const currentItems = list.querySelectorAll(".scan-item").length;
  if (currentItems === history.length) return;

  list.textContent = "";

  history.forEach((scan, i) => {
    const iconClass =
      scan.changes_count === 0 ? "scan-icon-none" :
      scan.all_succeeded       ? "scan-icon-ok"   : "scan-icon-fail";
    const iconChar =
      scan.changes_count === 0 ? "✓" :
      scan.all_succeeded       ? "✓" : "✗";
    const summary =
      scan.changes_count === 0
        ? "No changes detected"
        : scan.changes_count + " change(s) — " + (scan.all_succeeded ? "all processed" : "some errors");

    const item = document.createElement("div");
    item.className = "scan-item";
    item.id = "scan-" + i;

    // Header
    const header = document.createElement("div");
    header.className = "scan-header";
    header.addEventListener("click", function() { if (scan.changes_count > 0) toggleScan(i); });

    const icon = document.createElement("div");
    icon.className = "scan-icon " + iconClass;
    icon.textContent = iconChar;

    const meta = document.createElement("div");
    meta.className = "scan-meta";

    const timeEl = document.createElement("div");
    timeEl.className = "scan-time";
    timeEl.textContent = fmtDate(scan.scanned_at);

    const summaryEl = document.createElement("div");
    summaryEl.className = "scan-summary";
    summaryEl.textContent = summary;

    meta.appendChild(timeEl);
    meta.appendChild(summaryEl);

    const chev = document.createElement("div");
    chev.className = "scan-chevron";
    chev.id = "chev-" + i;
    chev.textContent = scan.changes_count > 0 ? "▶" : "";
    if (openScans.has(i)) chev.classList.add("chevron-open");

    header.appendChild(icon);
    header.appendChild(meta);
    header.appendChild(chev);
    item.appendChild(header);

    // Changes table
    if (scan.changes.length > 0) {
      const wrap = document.createElement("div");
      wrap.className = "changes-wrap";
      wrap.id = "changes-" + i;
      wrap.style.display = openScans.has(i) ? "block" : "none";
      wrap.appendChild(buildChangesTable(scan.changes));
      item.appendChild(wrap);
    }

    list.appendChild(item);
  });
}

async function fetchStatus() {
  try {
    const r = await fetch("/api/status");
    const data = await r.json();
    renderHistory(data);
  } catch (e) { /* ignore */ }
}

fetchStatus();
setInterval(fetchStatus, 5000);
</script>
</body>
</html>
